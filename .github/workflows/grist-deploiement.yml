name: Déploie des Grist
run-name: Compare et déploie des documents Grist
permissions: {}

on:
  workflow_dispatch: # Pour activer le déclenchement manuel

jobs:
  genere-comparaison:
    name: Comparaison
    runs-on: ubuntu-latest
    environment: DEPLOIEMENT_GRIST
    steps:
      - name: Récupère le snapshot
        run: |
          curl --request GET \
            --url https://grist.numerique.gouv.fr/api/docs/${{ secrets.GRIST_DEMO_DOC_ID }}/snapshots \
            --header 'Authorization: Bearer ${{ secrets.GRIST_PROD_API_KEY }}' \
            --header 'Content-Type: application/json' \
            | jq -r '.snapshots[0].docId' \
            > empreinte.txt

      - name: Compare les contenus
        run: |
          curl --request GET \
            --url https://grist.numerique.gouv.fr/api/docs/$(cat empreinte.txt)/compare/${{ secrets.GRIST_PROD_DOC_ID }}?detail=true \
            --header 'Authorization: Bearer ${{ secrets.GRIST_PROD_API_KEY }}' \
            --header 'Content-Type: application/json' \
            -o resultat.txt
          cat resultat.txt >> $GITHUB_STEP_SUMMARY

      - name: Sauvegarde l'empreinte source
        uses: actions/upload-artifact@v4
        with:
          name: empreinte-data-grist
          path: empreinte.txt

  deploiement-grist:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: genere-comparaison
    environment: DEPLOIEMENT_GRIST
    steps:
      - name: Télécharger les empreintes sources
        uses: actions/download-artifact@v4
        with:
          name: empreinte-data-grist

      - name: Récupère l'id source
        run: echo EMPREINTE=$(cat empreinte.txt) >> "$GITHUB_ENV"

      - name: Recopie le contenu
        run: |
          curl --request POST \
            --url https://grist.numerique.gouv.fr/api/docs/${{ secrets.GRIST_PROD_DOC_ID }}/replace \
            --header 'Authorization: Bearer ${{ secrets.GRIST_PROD_API_KEY }}' \
            --header 'content-type: application/json' \
            --data '{
              "sourceDocId": "${{ env.EMPREINTE }}"
            }' \
            --fail || exit 1
