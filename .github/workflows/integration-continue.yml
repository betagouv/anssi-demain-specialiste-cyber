name: L'intégration continue
permissions: {}

on: pull_request

jobs:
  build:
    name: Construction du site

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Déterminer la version de Node.js à utiliser
        run: |
          echo "NODE_VERSION=$(./scripts/get-node-version.sh)" >> $GITHUB_ENV

      - name: Utiliser la version Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Installe pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.24.0

      - name: Installe les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérfie le typage
        run: pnpm typecheck

      - name: Lint le projet
        run: pnpm lint

      - name: Exécute les tests
        run: pnpm test:ci
